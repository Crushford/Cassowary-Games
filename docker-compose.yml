services:
  queens-admin-postgres:
    image: postgres:16
    container_name: queens-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: queens_admin
      POSTGRES_USER: queens_admin
      POSTGRES_PASSWORD: queens_admin
    ports:
      - "5432:5432"
    volumes:
      - queens-admin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queens_admin -d queens_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  queens-admin-postgres-data:
