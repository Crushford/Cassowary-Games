image: 'node:20'

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - cd frontend
    - yarn install --immutable
    - yarn build
    - yarn build-storybook
  artifacts:
    paths:
      - frontend/dist

pages:
  stage: deploy
  script:
    - echo 'Pages deployment job'
  publish: frontend/dist
  only:
    - main
